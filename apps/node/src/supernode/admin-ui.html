<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISC Relay Admin</title>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252542;
      --text-primary: #ffffff;
      --text-muted: #8888aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --border: #2a2a3e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    h1 { font-size: 24px; font-weight: 600; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
    h3 { font-size: 14px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .status-bar {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .metric:last-child { border-bottom: none; }

    .metric-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.danger { background: var(--error); }
    button.danger:hover { background: #dc2626; }

    .log-viewer {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .log-entry:last-child { border-bottom: none; }

    .log-time { color: var(--text-muted); margin-right: 10px; }

    .bot-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bot-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }

    .bot-name { font-weight: 500; }
    .bot-stats { font-size: 12px; color: var(--text-muted); }

    .auth-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .auth-form input {
      flex: 1;
      padding: 10px 15px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .hidden { display: none; }

    .slider-container {
      margin: 15px 0;
    }

    .slider-container label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛰️ ISC Relay Admin</h1>
      <div class="status-bar">
        <div class="status-indicator">
          <span class="status-dot" id="connectionDot"></span>
          <span id="connectionStatus">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- Auth Section -->
    <div id="authSection" class="card">
      <h2>Authentication</h2>
      <div class="auth-form">
        <input type="password" id="authToken" placeholder="Enter admin token" />
        <button onclick="connect()">Connect</button>
      </div>
    </div>

    <!-- Main Dashboard (hidden until connected) -->
    <div id="dashboard" class="hidden">
      <!-- Node Status -->
      <div class="grid">
        <div class="card">
          <h2>Node Status</h2>
          <div class="metric">
            <span class="metric-label">Peer ID</span>
            <span id="peerId" class="metric-value" style="font-size: 14px;">-</span>
          </div>
          <div class="metric">
            <span class="metric-label">Connections</span>
            <span id="connections" class="metric-value">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Uptime</span>
            <span id="uptime" class="metric-value">0s</span>
          </div>
          <div class="metric">
            <span class="metric-label">Memory</span>
            <span id="memory" class="metric-value">-</span>
          </div>
        </div>

        <!-- Simulator Controls -->
        <div class="card">
          <h2>Simulator</h2>
          <div class="metric">
            <span class="metric-label">Status</span>
            <span id="simStatus" class="metric-value" style="font-size: 16px;">Stopped</span>
          </div>
          <div class="metric">
            <span class="metric-label">Active Bots</span>
            <span id="botCount" class="metric-value">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Total Posts</span>
            <span id="totalPosts" class="metric-value">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Msgs/Min</span>
            <span id="msgsPerMin" class="metric-value">0</span>
          </div>

          <div class="controls">
            <button id="startBtn" onclick="startSimulator()">Start</button>
            <button id="stopBtn" onclick="stopSimulator()" class="danger">Stop</button>
          </div>

          <div class="slider-container">
            <label>Bot Count: <span id="botCountLabel">5</span></label>
            <input type="range" id="botCountSlider" min="1" max="20" value="5" oninput="updateBotCountLabel(this.value)" />
          </div>
        </div>

        <!-- Bot List -->
        <div class="card">
          <h2>Active Bots</h2>
          <div id="botList" class="bot-list">
            <div class="bot-item">
              <span class="bot-name">No bots active</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Live Logs -->
      <div class="card">
        <h2>Live Logs</h2>
        <div id="logViewer" class="log-viewer"></div>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let authToken = '';

    function connect() {
      authToken = document.getElementById('authToken').value;
      if (!authToken) {
        alert('Please enter admin token');
        return;
      }

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.hostname}:9091`);

      ws.onopen = () => {
        document.getElementById('connectionStatus').textContent = 'Connected';
        document.getElementById('connectionDot').style.background = '#10b981';
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        refreshStatus();
        setInterval(refreshStatus, 5000);
      };

      ws.onclose = () => {
        document.getElementById('connectionStatus').textContent = 'Disconnected';
        document.getElementById('connectionDot').style.background = '#ef4444';
      };

      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        handleMessage(message);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }

    function send(action, params = {}) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('Not connected');
        return;
      }

      ws.send(JSON.stringify({
        id: Date.now().toString(),
        action,
        params,
        authToken,
      }));
    }

    function handleMessage(message) {
      if (message.type === 'log') {
        addLogEntry(message.message);
        return;
      }

      if (message.action === 'status' && message.success) {
        updateStatus(message.data);
      }

      if (message.action === 'simulator:status' && message.success) {
        updateSimulatorStatus(message.data);
      }

      if (message.action === 'simulator:bots' && message.success) {
        updateBotList(message.data.bots);
      }
    }

    function updateStatus(data) {
      document.getElementById('peerId').textContent = data.peerId.slice(-8);
      document.getElementById('connections').textContent = data.connections;
      document.getElementById('uptime').textContent = formatUptime(data.uptime);
      document.getElementById('memory').textContent = formatMemory(data.memory.heapUsed);
    }

    function updateSimulatorStatus(data) {
      if (!data.available) {
        document.getElementById('simStatus').textContent = 'Not Available';
        return;
      }

      document.getElementById('simStatus').textContent = data.botCount > 0 ? 'Running' : 'Stopped';
      document.getElementById('botCount').textContent = data.botCount;
      document.getElementById('totalPosts').textContent = data.totalPosts;
      document.getElementById('msgsPerMin').textContent = data.messagesPerMinute;
    }

    function updateBotList(bots) {
      const container = document.getElementById('botList');
      if (bots.length === 0) {
        container.innerHTML = '<div class="bot-item"><span class="bot-name">No bots active</span></div>';
        return;
      }

      container.innerHTML = bots.map(bot => `
        <div class="bot-item">
          <div>
            <span class="bot-name">${bot.name}</span>
            <span class="bot-stats"> • ${bot.postsCreated} posts</span>
          </div>
          <span style="color: ${bot.active ? '#10b981' : '#888'}">${bot.active ? '●' : '○'}</span>
        </div>
      `).join('');
    }

    function addLogEntry(message) {
      const viewer = document.getElementById('logViewer');
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="log-time">${time}</span>${message}`;

      viewer.appendChild(entry);
      viewer.scrollTop = viewer.scrollHeight;

      // Limit log entries
      while (viewer.children.length > 100) {
        viewer.removeChild(viewer.firstChild);
      }
    }

    function refreshStatus() {
      send('status');
      send('simulator:status');
      send('simulator:bots');
    }

    function startSimulator() {
      const count = parseInt(document.getElementById('botCountSlider').value);
      send('simulator:start', { botCount: count });
      setTimeout(refreshStatus, 1000);
    }

    function stopSimulator() {
      send('simulator:stop');
      setTimeout(refreshStatus, 1000);
    }

    function updateBotCountLabel(value) {
      document.getElementById('botCountLabel').textContent = value;
    }

    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      return `${h}h ${m}m ${s}s`;
    }

    function formatMemory(bytes) {
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }
  </script>
</body>
</html>
